# DigitalOcean App Platform Specification
# Perfloplast - Laravel 12 / Filament v3
name: perfloplast
region: nyc
services:
  - name: perfloplast-web
    github:
      repo: perfloplast12-wq/SistemaInventarioPerfloplast
      branch: main
      deploy_on_push: true
    instance_count: 1
    instance_size_slug: basic-xxs # $5.00/mo
    http_port: 8080
    build_command: |
      composer install --no-interaction --no-dev --optimize-autoloader
      npm install && npm run build
      php artisan filament:optimize
    run_command: heroku-php-apache2 public/
    envs:
      - key: APP_ENV
        scope: RUN_AND_BUILD_TIME
        value: production
      - key: APP_DEBUG
        scope: RUN_AND_BUILD_TIME
        value: "false"
      - key: LOG_CHANNEL
        scope: RUN_TIME
        value: errorlog
      - key: DB_CONNECTION
        scope: RUN_TIME
        value: mysql

jobs:
  - name: migrate-and-seed
    kind: PRE_DEPLOY
    instance_size_slug: basic-xxs
    github:
      repo: perfloplast12-wq/SistemaInventarioPerfloplast
      branch: main
    build_command: |
      composer install --no-interaction --no-dev --optimize-autoloader
    run_command: |
      php artisan migrate --force && php artisan db:seed --class=PermissionsSeeder --force && php artisan db:seed --class=RolesSeeder --force
