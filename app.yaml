# DigitalOcean App Platform Specification
# Perfloplast - Laravel 12 / Filament v3
name: perfloplast
region: nyc
services:
  - name: perfloplast-web
    github:
      repo: perfloplast12-wq/SistemaInventarioPerfloplast
      branch: main
      deploy_on_push: true
    instance_count: 1
    instance_size_slug: basic-xxs # $5.00/mo
    http_port: 8080
    dockerfile_path: Dockerfile
    envs:
      - key: APP_ENV
        scope: RUN_AND_BUILD_TIME
        value: production
      - key: APP_DEBUG
        scope: RUN_AND_BUILD_TIME
        value: "true"
      - key: LOG_CHANNEL
        scope: RUN_TIME
        value: errorlog
      - key: DB_CONNECTION
        scope: RUN_TIME
        value: mysql
      - key: SESSION_DRIVER
        scope: RUN_TIME
        value: redis
      - key: CACHE_STORE
        scope: RUN_TIME
        value: redis
      - key: QUEUE_CONNECTION
        scope: RUN_TIME
        value: redis
      - key: APP_URL
        scope: RUN_AND_BUILD_TIME
        value: https://perfloplast-app-6t3dz.ondigitalocean.app

workers:
  - name: perfloplast-worker
    github:
      repo: perfloplast12-wq/SistemaInventarioPerfloplast
      branch: main
      deploy_on_push: true
    instance_count: 1
    instance_size_slug: basic-xxs
    dockerfile_path: Dockerfile
    run_command: php artisan queue:work redis --sleep=3 --tries=3 --timeout=90
    envs:
      - key: QUEUE_CONNECTION
        scope: RUN_TIME
        value: redis
      - key: DB_CONNECTION
        scope: RUN_TIME
        value: mysql

jobs:
  - name: migrate-and-seed
    kind: PRE_DEPLOY
    instance_size_slug: basic-xxs
    github:
      repo: perfloplast12-wq/SistemaInventarioPerfloplast
      branch: main
    build_command: |
      composer install --no-interaction --no-dev --optimize-autoloader
    run_command: |
      php artisan migrate --force && php artisan db:seed --class=PermissionsSeeder --force && php artisan db:seed --class=RolesSeeder --force
