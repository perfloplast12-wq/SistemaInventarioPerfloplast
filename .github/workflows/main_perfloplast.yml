name: Build and Deploy Docker Image - Perfloplast

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/perfloplast:latest
            ghcr.io/${{ github.repository_owner }}/perfloplast:v2
            ghcr.io/${{ github.repository_owner }}/perfloplast:v3
            ghcr.io/${{ github.repository_owner }}/perfloplast:v4
            ghcr.io/${{ github.repository_owner }}/perfloplast:v5
            ghcr.io/${{ github.repository_owner }}/perfloplast:v6
            ghcr.io/${{ github.repository_owner }}/perfloplast:v7
            ghcr.io/${{ github.repository_owner }}/perfloplast:v8
            ghcr.io/${{ github.repository_owner }}/perfloplast:v9
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    
    steps:
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'Perfloplast' # New App Service name
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          images: 'ghcr.io/${{ github.repository_owner }}/perfloplast:latest'